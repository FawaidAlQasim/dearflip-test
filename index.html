<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>كتب مجلس السماع — DearFlip Trial</title>

<style>
  html, body { margin:0; padding:0; height:100%; background:#0f3d2e; overflow:hidden; }
  #topbar{
    position:fixed; top:0; left:0; right:0; z-index:50;
    background:#0f3d2e; color:#d8b872; font-family:sans-serif;
    padding:10px 16px; font-size:13px; text-align:center; direction:ltr;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  #topbar b{ color:#fff; }
  #book-wrap{ position:fixed; top:40px; left:0; right:0; bottom:0; }
</style>

<!-- Flipbook StyleSheets — must come before the container per DearFlip's own docs -->
<link href="dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
<link href="dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">
</head>
<body>

<div id="topbar">
  <b>DearFlip Lite (v1.7, free/trial build)</b> — for evaluation only, not the paid v2.x product. Replace <code>book.pdf</code> with your own file to test.
</div>

<div id="book-wrap">
  <div class="_df_book"
       id="my_flipbook"
       source="book.pdf"
       backgroundcolor="#0f3d2e"
       height="100%">
  </div>
</div>

<!-- Scripts — DearFlip requires these placed before </body>, not in <head> -->
<script src="dflip/js/libs/jquery.min.js" type="text/javascript"></script>
<script src="dflip/js/dflip.min.js" type="text/javascript"></script>

<script>
  jQuery(document).ready(function () {
    // Arabic UI text — DearFlip's own translation mechanism (see their
    // "Translate UI texts" docs). Applied globally before the book inits.
    DFLIP.defaults.text = {
      toggleSound: "الصوت",
      toggleThumbnails: "الصور المصغرة",
      toggleOutline: "الفهرس",
      previousPage: "الصفحة السابقة",
      nextPage: "الصفحة التالية",
      toggleFullscreen: "ملء الشاشة",
      zoomIn: "تكبير",
      zoomOut: "تصغير",
      toggleHelp: "مساعدة",
      singlePageMode: "صفحة واحدة",
      doublePageMode: "صفحتان",
      downloadPDFFile: "تحميل الملف",
      gotoFirstPage: "الصفحة الأولى",
      gotoLastPage: "الصفحة الأخيرة"
    };

    // Per-book options — this is the direct equivalent of everything we
    // hand-built for the custom reader, but native to the library:
    // RTL binding, download control, and (unlike our custom build) DearFlip
    // handles partial/lazy loading of large PDFs internally, automatically.
    var option_my_flipbook = {
      direction: DFLIP.DIRECTION.RTL,   // <-- native RTL, no CSS-mirror hacks needed
      webgl: true,                      // realistic 3D page-turn (falls back to 2D if unsupported)
      soundEnable: false,                // page-turn sound off by default; toggle-able in the UI
      duration: 700,
      showDownloadControl: true,
      enableDownload: true,             // older/newer builds use different key names — set both, harmless
      showSearchControl: true,
      showPrintControl: false,
      autoEnableOutline: false,         // TOC panel available via toolbar button, not forced open
      overwritePDFOutline: false,       // keep the PDF's own bookmarks as the TOC source, like our build
      backgroundColor: "#0f3d2e"
    };
  });
</script>

</body>
</html>
